{% extends "core/base.html" %}
{% load static %}

{% block content %}
<h2>Excluir Rodada</h2>

<p>Tem certeza que deseja excluir a rodada <strong>{{ object.nome }}</strong> do dia <strong>{{ object.data }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Excluir</button>
    <a href="{% url 'core:rodada_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
