{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<h2>Cadastro de Empresa</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Salvar</button>
</form>
<br>
<div class="mb-3">
    
    <a href="{% url 'core:empresa_list' %}" class="btn btn-secondary">Voltar</a>
    <a href="{% url 'core:empresa_create' %}" class="btn btn-success">Novo cadastro</a>
</div>
{% endblock %}
