{% extends 'core/base.html' %}
{% load static %}

{% block content %}

<h2>Editar Reserva</h2>

<div class="mb-3">
    <span class="badge bg-primary fs-6">
        Rodada: {{ rodada.nome }}
    </span>
    <span class="badge bg-secondary fs-6">
        Mesa {{ mesa.numero }}
    </span>
</div>

<form method="post" class="mt-3">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Empresa</label>
        <select name="empresa" class="form-select" required>
            {% for e in empresas %}
                <option value="{{ e.id }}"
                    {% if e.id == reserva.empresa.id %}selected{% endif %}>
                    {{ e.nome }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-primary">Salvar Alterações</button>

    <a href="{% url 'core:mesas_da_rodada' rodada.id %}" class="btn btn-secondary">
        Cancelar
    </a>
</form>

{% endblock %}
