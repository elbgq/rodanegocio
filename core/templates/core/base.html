{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Reunião de Negócios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS customizado -->
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2E8B57;">
    <div class="container">

        <!-- Marca -->
        <a class="navbar-brand text-primary fw-bold" href="{% url 'core:home' %}">
            Reunião de Negócios
        </a>

        <!-- Botão mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link text-primary" href="{% url 'core:empresa_list' %}">Empresas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-primary" href="{% url 'core:evento_list' %}">Eventos</a>
                </li>

                {% if request.session.acesso_rodanegocios %}
                <li class="nav-item dropdown">
                    <a class="nav-link text-primary dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        Conta
                    </a>
                    <ul class="dropdown-menu" style="background-color: #bdf1d9;">
                        <li><a class="dropdown-item" href="{% url 'core:configuracao_sistema' %}">Configurações</a></li>
                        <li><a class="dropdown-item" href="/reset-senha/">Alterar senha</a></li>
                        <li><a class="dropdown-item" href="{% url 'core:sair' %}">Sair</a></li>
                    </ul>
                </li>
                {% endif %}

            </ul>
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
