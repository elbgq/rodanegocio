{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<h2 class="mb-4">
    {% if interesse %}Editar Interesse{% else %}Novo Interesse{% endif %}
</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Categoria</label>
        {{ form.categoria }}
    </div>

    <div class="mb-3">
        <label class="form-label">Nome</label>
        {{ form.nome }}
    </div>

    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="{% url 'core:interesse_list' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
