{% extends 'core/base.html' %}
{% load static %}
{% block content %}
<h2>{{ evento.nome }}</h2>

<p><strong>Data:</strong> {{ evento.data }}</p>
<p><strong>Local:</strong> {{ evento.local }}</p>
<p><strong>Descrição:</strong> {{ evento.descricao }}</p>

<a href="{% url 'core:evento_update' evento.id %}" class="btn btn-warning">Editar</a>
<a href="{% url 'core:evento_list' %}" class="btn btn-secondary">Voltar</a>

{% endblock %}
